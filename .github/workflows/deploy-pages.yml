name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build web-picture-collage
        run: pnpm build:web-picture-collage

      - name: Build web-quill-editor
        run: pnpm build:web-quill-editor

      - name: Prepare deployment directory
        run: |
          mkdir -p deployment/web-picture-collage
          mkdir -p deployment/web-quill-editor
          cp -r projects/web-picture-collage/dist/* deployment/web-picture-collage/
          cp -r projects/web-quill-editor/dist/* deployment/web-quill-editor/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deployment

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4